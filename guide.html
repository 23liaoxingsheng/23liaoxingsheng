 <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态爱心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 主爱心 */
        .heart {
            width: 150px;
            height: 150px;
            background: #ff477e;
            position: relative;
            transform: rotate(-45deg);
            animation: beat 1s infinite alternate;
            box-shadow: 0 0 30px rgba(255, 71, 126, 0.6);
        }

        .heart::before,
        .heart::after {
            content: "";
            width: 150px;
            height: 150px;
            background: #ff477e;
            border-radius: 50%;
            position: absolute;
        }

        .heart::before {
            top: -75px;
            left: 0;
        }

        .heart::after {
            top: 0;
            left: 75px;
        }

        /* 跳动动画 */
        @keyframes beat {
            0% {
                transform: rotate(-45deg) scale(1);
            }
            100% {
                transform: rotate(-45deg) scale(1.1);
            }
        }

        /* 背景爱心雨 */
        .heart-rain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .mini-heart {
            position: absolute;
            color: #ff477e;
            font-size: 20px;
            opacity: 0.7;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="heart-rain" id="rain"></div>
    <div class="heart"></div>

    <script>
        // 生成背景爱心雨
        const rainContainer = document.getElementById('rain');
        const heartCount = 30;

        for (let i = 0; i < heartCount; i++) {
            const miniHeart = document.createElement('div');
            miniHeart.className = 'mini-heart';
            miniHeart.innerHTML = '❤';
            miniHeart.style.left = Math.random() * 100 + '%';
            miniHeart.style.animationDuration = (Math.random() * 5 + 5) + 's';
            miniHeart.style.animationDelay = Math.random() * 10 + 's';
            rainContainer.appendChild(miniHeart);
        }
    </script>
</body>
</html>
