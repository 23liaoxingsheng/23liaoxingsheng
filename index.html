<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专属小测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe8e8, #fff0f5);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.5s;
        }

        .card {
            background: white;
            padding: 60px 40px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.2);
            text-align: center;
            max-width: 400px;
        }

        .pig-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        h1 {
            color: #ff6b9d;
            margin-bottom: 40px;
            font-size: 28px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        button {
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-yes {
            background: linear-gradient(135deg, #ff6b9d, #ff477e);
            color: white;
        }

        .btn-yes:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.4);
        }

        .btn-no {
            background: #f0f0f0;
            color: #666;
        }

        .btn-no:hover {
            background: #e0e0e0;
        }

        .fail-message {
            margin-top: 30px;
            color: #ff477e;
            font-size: 20px;
            display: none;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="pig-icon">🐷</div>
        <h1>你是不是小猪？</h1>
        <div class="btn-group">
            <button class="btn-yes" onclick="window.location.href='love.html'">是！</button>
            <button class="btn-no" onclick="showFail()">不是</button>
        </div>
        <p class="fail-message" id="failText">没爱了，故障💔</p >
    </div>

    <script>
        function showFail() {
            const text = document.getElementById('failText');
            text.style.display = 'block';
            // 改变背景颜色，增加氛围感
            document.body.style.background = 'linear-gradient(135deg, #e0e0e0, #c0c0c0)';
        }
    </script>
</body>
</html>
