<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小问答</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#fef2f6;
            font-family:"微软雅黑";
        }
        .box{
            background:#fff;
            padding:50px 40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 0 20px #ffc9d9;
        }
        h1{
            color:#ff6699;
            margin-bottom:35px;
            font-size:26px;
        }
        .btns{
            display:flex;
            gap:25px;
            justify-content:center;
        }
        button{
            padding:12px 35px;
            border:none;
            border-radius:30px;
            font-size:17px;
            cursor:pointer;
        }
        .yes{
            background:#ff6699;
            color:#fff;
        }
        .no{
            background:#eeeeee;
            color:#333;
        }
        .tip{
            margin-top:30px;
            font-size:20px;
            color:red;
            display:none;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>你是不是小猪？</h1>
        <div class="btns">
            <!-- 选是：跳转到 guide.html -->
            <button class="yes" onclick="location.href='guide.html'">是</button>
            <!-- 选不是：弹出文字 -->
            <button class="no" onclick="showText()">不是</button>
        </div>
        <div class="tip" id="msg">没爱了，故障</div>
    </div>

    <script>
        function showText(){
            document.getElementById("msg").style.display="block";
        }
    </script>
</body>
</html>
