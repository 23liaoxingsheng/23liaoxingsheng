<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石家庄居民区火灾疏散系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a192f 0%, #112240 50%, #0a192f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* 背景粒子效果 */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 200, 200, 0.6);
            border-radius: 50%;
            animation: float 15s infinite linear;
            opacity: 0;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* 登录卡片 */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: rgba(17, 34, 64, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 200, 200, 0.3);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 
                0 0 40px rgba(0, 200, 200, 0.15),
                inset 0 0 20px rgba(0, 200, 200, 0.05);
        }

        /* 标题 */
        .login-title {
            text-align: center;
            margin-bottom: 35px;
        }

        .login-title h1 {
            color: #00e5e5;
            font-size: 28px;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(0, 229, 229, 0.5);
            letter-spacing: 2px;
        }

        .login-title p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 8px;
        }

        /* 表单组 */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-size: 15px;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(10, 25, 47, 0.6);
            border: 1px solid rgba(0, 200, 200, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group input:focus {
            outline: none;
            border-color: #00e5e5;
            box-shadow: 0 0 15px rgba(0, 229, 229, 0.3);
            background: rgba(10, 25, 47, 0.8);
        }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #00a8a8, #00e5e5);
            border: none;
            border-radius: 8px;
            color: #0a192f;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 229, 229, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* 底部信息 */
        .footer-info {
            text-align: center;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <!-- 背景粒子 -->
    <div class="particles" id="particles"></div>

    <!-- 登录卡片 -->
    <div class="login-card">
        <div class="login-title">
            <h1>石家庄居民区火灾疏散系统</h1>
            <p>Fire Evacuation System for Residential Areas</p >
        </div>
        <form>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" placeholder="请输入密码">
            </div>
            <button type="submit" class="login-btn">登录系统</button>
        </form>
        <div class="footer-info">
            © 2026 石家庄居民区火灾疏散系统 版权所有
        </div>
    </div>

    <script>
        // 生成背景粒子
        const particlesContainer = document.getElementById('particles');
        const particleCount = 40;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
