<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动漫风首页</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            /* 动漫渐变背景 */
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "微软雅黑",sans-serif;
            color: #fff;
        }
        .box{
            background: rgba(255,255,255,0.1);
            padding: 50px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 30px #4e6ef280;
            backdrop-filter: blur(10px);
            text-align: center;
        }
        .question{
            font-size: 26px;
            margin-bottom: 40px;
            text-shadow: 0 0 8px #ff88cc;
            letter-spacing: 2px;
        }
        button{
            border: none;
            width: 140px;
            height: 50px;
            line-height: 50px;
            border-radius: 50px;
            font-size: 17px;
            margin: 0 15px;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .btn1{
            background: #ff6b81;
            color: #fff;
        }
        .btn2{
            background: #48dbfb;
            color: #000;
        }
        button:hover{
            transform: scale(1.08);
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

    <div class="box">
        <p class="question">你想看世界上最帅的帅哥哥嘛？</p >
        <button class="btn1" onclick="noLook()">不想看</button>
        <button class="btn2" onclick="yesLook()">想看</button>
    </div>

    <script>
        function noLook(){
            alert("别不识趣哈，老弟");
        }
        function yesLook(){
            location.href = "guide.html";
        }
    </script>

</body>
</html>
